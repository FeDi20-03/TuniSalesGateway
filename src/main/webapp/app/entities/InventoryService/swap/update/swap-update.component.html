<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-swap-heading"
          data-cy="SwapCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Créer ou éditer un Échange (Swap)
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light rounded">
          <h5 class="border-bottom pb-2 mb-3 text-primary">Information Client</h5>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.clientId" for="field_clientId"
                >ID Client</label
              >
              <input type="number" class="form-control" name="clientId" id="field_clientId" formControlName="clientId" />
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.clientName" for="field_clientName"
                >Nom du Client</label
              >
              <div class="input-group">
                <span class="input-group-text"><fa-icon icon="user"></fa-icon></span>
                <input type="text" class="form-control" name="clientName" id="field_clientName" formControlName="clientName" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Détails de l'Échange</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label
              class="form-label fw-bold text-danger"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.outgoingItem"
              for="field_outgoingItem"
              >Article Sortant (IMEI)</label
            >
            <select
              class="form-control border-danger"
              id="field_outgoingItem"
              name="outgoingItem"
              formControlName="outgoingItem"
              [compareWith]="compareStockItem"
            >
              <option *ngIf="!editForm.get('outgoingItem')!.value" [ngValue]="null" selected></option>
              <option [ngValue]="stockItemOption" *ngFor="let stockItemOption of stockItemsSharedCollection">
                {{ stockItemOption.imei }}
              </option>
            </select>
            <small class="text-muted">L'unité remise au client.</small>
          </div>

          <div class="col-md-6 mb-3">
            <label
              class="form-label fw-bold text-success"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.incomingItem"
              for="field_incomingItem"
              >Article Entrant (IMEI)</label
            >
            <select
              class="form-control border-success"
              id="field_incomingItem"
              name="incomingItem"
              formControlName="incomingItem"
              [compareWith]="compareStockItem"
            >
              <option [ngValue]="null"></option>
              <option [ngValue]="stockItemOption" *ngFor="let stockItemOption of stockItemsSharedCollection">
                {{ stockItemOption.imei }}
              </option>
            </select>
            <small class="text-muted">L'unité défectueuse ou retournée.</small>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-secondary">État & Justification</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.status" for="field_status"
              >Statut du Swap</label
            >
            <select class="form-control" name="status" formControlName="status" id="field_status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.SwapStatus.null' | translate }}</option>
              <option *ngFor="let swapStatus of swapStatusValues" [value]="swapStatus">
                {{ 'tuniSalesGatewayApp.SwapStatus.' + swapStatus | translate }}
              </option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.reason" for="field_reason"
              >Motif de l'échange</label
            >
            <input
              type="text"
              class="form-control"
              name="reason"
              id="field_reason"
              formControlName="reason"
              placeholder="Ex: Panne écran, SAV..."
            />
          </div>
        </div>
      </div>

      <div class="mb-4 border p-3 rounded bg-light">
        <div class="row">
          <div class="col-md-4 mb-2">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.createdAt">Créé le</label>
            <input type="datetime-local" class="form-control form-control-sm" formControlName="createdAt" />
          </div>
          <div class="col-md-4 mb-2">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.resolvedAt">Résolu le</label>
            <input type="datetime-local" class="form-control form-control-sm" formControlName="resolvedAt" />
          </div>
          <div class="col-md-4 mb-2">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceSwap.updatedAt">Mise à jour</label>
            <input type="datetime-local" class="form-control form-control-sm bg-white" formControlName="updatedAt" readonly />
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5 shadow-sm">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Enregistrer le Swap</span>
        </button>
      </div>
    </form>
  </div>
</div>
