<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-stock-audit-heading"
          data-cy="StockAuditCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Créer ou éditer un Audit de Stock
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light rounded">
          <h5 class="border-bottom pb-2 mb-3 text-primary">Contexte de l'Audit</h5>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.warehouse" for="field_warehouse"
                >Entrepôt / Magasin</label
              >
              <select
                class="form-control"
                id="field_warehouse"
                name="warehouse"
                formControlName="warehouse"
                [compareWith]="compareWarehouse"
              >
                <option *ngIf="!editForm.get('warehouse')!.value" [ngValue]="null" selected></option>
                <option [ngValue]="warehouseOption" *ngFor="let warehouseOption of warehousesSharedCollection">
                  {{ warehouseOption.name }}
                </option>
              </select>
              <div
                *ngIf="editForm.get(['warehouse'])!.invalid && (editForm.get(['warehouse'])!.dirty || editForm.get(['warehouse'])!.touched)"
              >
                <small
                  class="form-text text-danger"
                  *ngIf="editForm.get(['warehouse'])?.errors?.required"
                  jhiTranslate="entity.validation.required"
                  >Entrepôt requis.</small
                >
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.status" for="field_status"
                >État de l'Audit</label
              >
              <select class="form-control" name="status" formControlName="status" id="field_status">
                <option [ngValue]="null">{{ 'tuniSalesGatewayApp.AuditStatus.null' | translate }}</option>
                <option *ngFor="let auditStatus of auditStatusValues" [value]="auditStatus">
                  {{ 'tuniSalesGatewayApp.AuditStatus.' + auditStatus | translate }}
                </option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Données de l'Inventaire</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label
              class="form-label"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.theoreticalCount"
              for="field_theoreticalCount"
              >Stock Théorique (Système)</label
            >
            <input
              type="number"
              class="form-control border-info"
              name="theoreticalCount"
              id="field_theoreticalCount"
              formControlName="theoreticalCount"
            />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.physicalCount" for="field_physicalCount"
              >Stock Physique (Réel)</label
            >
            <input
              type="number"
              class="form-control border-success"
              name="physicalCount"
              id="field_physicalCount"
              formControlName="physicalCount"
            />
          </div>

          <div class="col-md-4 mb-3">
            <label
              class="form-label"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.discrepancyCount"
              for="field_discrepancyCount"
              >Écart constaté</label
            >
            <input
              type="number"
              class="form-control border-danger bg-light"
              name="discrepancyCount"
              id="field_discrepancyCount"
              formControlName="discrepancyCount"
              readonly
            />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Traçabilité</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.auditorLogin" for="field_auditorLogin"
              >Auditeur (Login)</label
            >
            <div class="input-group">
              <span class="input-group-text"><fa-icon icon="user"></fa-icon></span>
              <input type="text" class="form-control" name="auditorLogin" id="field_auditorLogin" formControlName="auditorLogin" />
            </div>
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.startedAt" for="field_startedAt"
              >Débuté le</label
            >
            <input type="datetime-local" class="form-control" name="startedAt" id="field_startedAt" formControlName="startedAt" />
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.closedAt" for="field_closedAt"
              >Clôturé le</label
            >
            <input type="datetime-local" class="form-control" name="closedAt" id="field_closedAt" formControlName="closedAt" />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAudit.notes" for="field_notes"
          >Justifications ou Notes</label
        >
        <textarea
          class="form-control"
          name="notes"
          id="field_notes"
          rows="3"
          formControlName="notes"
          placeholder="Expliquez les écarts éventuels..."
        ></textarea>
        <div *ngIf="editForm.get('notes')!.invalid && (editForm.get('notes')!.dirty || editForm.get('notes')!.touched)">
          <small class="form-text text-danger" *ngIf="editForm.get('notes')?.errors?.maxlength">Max 2000 caractères.</small>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5 shadow-sm">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Valider l'Audit</span>
        </button>
      </div>
    </form>
  </div>
</div>
