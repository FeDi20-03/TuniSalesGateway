<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-stock-movement-heading"
          data-cy="StockMovementCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Créer ou éditer un Mouvement de Stock
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light rounded">
          <h5 class="border-bottom pb-2 mb-3 text-primary">Article concerné</h5>
          <div class="row">
            <div class="col-md-8 mb-3">
              <label
                class="form-label fw-bold"
                jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.stockItem"
                for="field_stockItem"
                >Produit (IMEI)</label
              >
              <select
                class="form-control form-control-lg border-primary"
                id="field_stockItem"
                name="stockItem"
                formControlName="stockItem"
                [compareWith]="compareStockItem"
              >
                <option *ngIf="editForm.get(['stockItem'])!.value == null" [ngValue]="null" selected></option>
                <option [ngValue]="stockItemOption" *ngFor="let stockItemOption of stockItemsSharedCollection">
                  {{ stockItemOption.imei }}
                </option>
              </select>
              <div
                *ngIf="editForm.get(['stockItem'])!.invalid && (editForm.get(['stockItem'])!.dirty || editForm.get(['stockItem'])!.touched)"
              >
                <small
                  class="form-text text-danger"
                  *ngIf="editForm.get(['stockItem'])?.errors?.required"
                  jhiTranslate="entity.validation.required"
                  >L'IMEI est requis.</small
                >
              </div>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.quantity" for="field_quantity"
                >Quantité</label
              >
              <input type="number" class="form-control form-control-lg" name="quantity" id="field_quantity" formControlName="quantity" />
              <div *ngIf="editForm.get('quantity')!.invalid && (editForm.get('quantity')!.dirty || editForm.get('quantity')!.touched)">
                <small
                  class="form-text text-danger"
                  *ngIf="editForm.get('quantity')?.errors?.required"
                  jhiTranslate="entity.validation.required"
                  >Requis.</small
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-secondary">Transfert / Flux</h5>
        <div class="row align-items-center">
          <div class="col-md-5 mb-3">
            <label
              class="form-label text-muted"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.fromWarehouse"
              for="field_fromWarehouse"
              >Entrepôt d'origine</label
            >
            <select
              class="form-control border-warning"
              id="field_fromWarehouse"
              name="fromWarehouse"
              formControlName="fromWarehouse"
              [compareWith]="compareWarehouse"
            >
              <option [ngValue]="null">-- Sélectionner l'origine --</option>
              <option [ngValue]="warehouseOption" *ngFor="let warehouseOption of warehousesSharedCollection">
                {{ warehouseOption.name }}
              </option>
            </select>
          </div>

          <div class="col-md-2 mb-3 text-center d-none d-md-block">
            <fa-icon icon="arrow-right" class="text-muted fa-2x mt-4"></fa-icon>
          </div>

          <div class="col-md-5 mb-3">
            <label
              class="form-label text-muted"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.toWarehouse"
              for="field_toWarehouse"
              >Entrepôt de destination</label
            >
            <select
              class="form-control border-success"
              id="field_toWarehouse"
              name="toWarehouse"
              formControlName="toWarehouse"
              [compareWith]="compareWarehouse"
            >
              <option [ngValue]="null">-- Sélectionner la destination --</option>
              <option [ngValue]="warehouseOption" *ngFor="let warehouseOption of warehousesSharedCollection">
                {{ warehouseOption.name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-secondary">Nature du mouvement</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.movementType" for="field_movementType"
              >Type de mouvement</label
            >
            <select class="form-control" name="movementType" formControlName="movementType" id="field_movementType">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.MovementType.null' | translate }}</option>
              <option *ngFor="let movementType of movementTypeValues" [value]="movementType">
                {{ 'tuniSalesGatewayApp.MovementType.' + movementType | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.reference" for="field_reference"
              >Référence (N° Bon/Facture)</label
            >
            <input
              type="text"
              class="form-control"
              name="reference"
              id="field_reference"
              formControlName="reference"
              placeholder="Ex: BL-2024-001"
            />
          </div>

          <div class="col-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.reason" for="field_reason"
              >Motif / Justification</label
            >
            <textarea
              class="form-control"
              name="reason"
              id="field_reason"
              rows="2"
              formControlName="reason"
              placeholder="Pourquoi ce mouvement ?"
            ></textarea>
          </div>
        </div>
      </div>

      <div class="mb-4 border p-3 rounded bg-light">
        <div class="row">
          <div class="col-md-6">
            <label
              class="form-label"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.performedByLogin"
              for="field_performedByLogin"
              >Effectué par</label
            >
            <input
              type="text"
              class="form-control bg-white"
              name="performedByLogin"
              id="field_performedByLogin"
              formControlName="performedByLogin"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockMovement.createdAt" for="field_createdAt"
              >Date du mouvement</label
            >
            <input type="datetime-local" class="form-control bg-white" name="createdAt" id="field_createdAt" formControlName="createdAt" />
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5 shadow-sm">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Confirmer le mouvement</span>
        </button>
      </div>
    </form>
  </div>
</div>
