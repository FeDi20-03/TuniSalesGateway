<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-stock-audit-line-heading"
          data-cy="StockAuditLineCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Détail de l'Audit de Stock
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light rounded">
          <h5 class="border-bottom pb-2 mb-3 text-primary">Références</h5>
          <div class="row">
            <div class="col-md-4 mb-3" *ngIf="editForm.controls.id.value !== null">
              <label class="form-label" jhiTranslate="global.field.id" for="field_id">Ligne ID</label>
              <input type="number" class="form-control bg-white" name="id" id="field_id" formControlName="id" [readonly]="true" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.audit" for="field_audit"
                >ID Audit Parent</label
              >
              <select class="form-control" id="field_audit" name="audit" formControlName="audit" [compareWith]="compareStockAudit">
                <option *ngIf="editForm.get(['audit'])!.value == null" [ngValue]="null" selected></option>
                <option [ngValue]="stockAuditOption" *ngFor="let stockAuditOption of stockAuditsSharedCollection">
                  {{ stockAuditOption.id }}
                </option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.stockItem" for="field_stockItem"
                >Produit (IMEI)</label
              >
              <select
                class="form-control border-primary"
                id="field_stockItem"
                name="stockItem"
                formControlName="stockItem"
                [compareWith]="compareStockItem"
              >
                <option *ngIf="!editForm.get('stockItem')!.value" [ngValue]="null" selected></option>
                <option [ngValue]="stockItemOption" *ngFor="let stockItemOption of stockItemsSharedCollection">
                  {{ stockItemOption.imei }}
                </option>
              </select>
              <div
                *ngIf="editForm.get(['stockItem'])!.invalid && (editForm.get(['stockItem'])!.dirty || editForm.get(['stockItem'])!.touched)"
              >
                <small
                  class="form-text text-danger"
                  *ngIf="editForm.get(['stockItem'])?.errors?.required"
                  jhiTranslate="entity.validation.required"
                  >L'IMEI est requis.</small
                >
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Vérification de Terrain</h5>
        <div class="row align-items-center">
          <div class="col-md-6 mb-3">
            <div class="form-check form-switch p-3 border rounded">
              <input
                class="form-check-input ms-0 me-2"
                type="checkbox"
                name="foundPhysically"
                id="field_foundPhysically"
                formControlName="foundPhysically"
              />
              <label
                class="form-check-label fw-bold"
                jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.foundPhysically"
                for="field_foundPhysically"
                >Produit trouvé physiquement ?</label
              >
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.createdAt" for="field_createdAt"
              >Date du scan</label
            >
            <input type="datetime-local" class="form-control" name="createdAt" id="field_createdAt" formControlName="createdAt" />
          </div>
        </div>
      </div>

      <div class="mb-4 border p-3 rounded bg-white">
        <h5 class="border-bottom pb-2 mb-3 text-warning">Résolution des Écarts</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.resolution" for="field_resolution"
              >Action de résolution</label
            >
            <select class="form-control" name="resolution" formControlName="resolution" id="field_resolution">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.AuditResolution.null' | translate }}</option>
              <option *ngFor="let auditResolution of auditResolutionValues" [value]="auditResolution">
                {{ 'tuniSalesGatewayApp.AuditResolution.' + auditResolution | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label
              class="form-label"
              jhiTranslate="tuniSalesGatewayApp.inventoryServiceStockAuditLine.resolutionNote"
              for="field_resolutionNote"
              >Note explicative</label
            >
            <textarea
              class="form-control"
              name="resolutionNote"
              id="field_resolutionNote"
              rows="2"
              formControlName="resolutionNote"
              placeholder="Détails sur la résolution..."
            ></textarea>
            <div
              *ngIf="
                editForm.get('resolutionNote')!.invalid &&
                (editForm.get('resolutionNote')!.dirty || editForm.get('resolutionNote')!.touched)
              "
            >
              <small class="form-text text-danger" *ngIf="editForm.get('resolutionNote')?.errors?.maxlength">Max 500 caractères.</small>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Enregistrer la ligne</span>
        </button>
      </div>
    </form>
  </div>
</div>
