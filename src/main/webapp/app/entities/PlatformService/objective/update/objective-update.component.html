<div class="container py-4">
  <div class="col-12 col-md-10 col-lg-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm" class="shadow-sm rounded bg-white p-4 border">
      <div class="d-flex align-items-center justify-content-between border-bottom pb-3 mb-4">
        <h2
          id="jhi-objective-heading"
          data-cy="ObjectiveCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.home.createOrEditLabel"
          class="h4 mb-0 text-primary"
        >
          Créer ou éditer un Objectif
        </h2>
        <span class="badge bg-light text-dark border" *ngIf="editForm.get('id')?.value"> ID: {{ editForm.get('id')?.value }} </span>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="row">
        <div class="col-md-6">
          <div class="p-3 mb-3 rounded bg-light border-start border-4 border-primary">
            <h6 class="fw-bold mb-3 text-uppercase small text-muted">Configuration</h6>

            <div class="mb-3">
              <label
                class="form-label fw-semibold"
                jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.assignedToLogin"
                for="field_assignedToLogin"
                >Assigné à</label
              >
              <input
                type="text"
                class="form-control shadow-sm"
                name="assignedToLogin"
                id="field_assignedToLogin"
                formControlName="assignedToLogin"
              />
              <div
                *ngIf="
                  editForm.get('assignedToLogin')!.invalid &&
                  (editForm.get('assignedToLogin')!.dirty || editForm.get('assignedToLogin')!.touched)
                "
              >
                <small
                  class="text-danger"
                  *ngIf="editForm.get('assignedToLogin')?.errors?.required"
                  jhiTranslate="entity.validation.required"
                  >Obligatoire.</small
                >
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.period" for="field_period"
                >Période</label
              >
              <input
                type="text"
                class="form-control shadow-sm"
                name="period"
                id="field_period"
                formControlName="period"
                placeholder="ex: 2026-04"
              />
            </div>

            <div class="mb-0 small">
              <label class="form-label text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.tenantId">Tenant Id</label>
              <input
                type="number"
                class="form-control form-control-sm border-dashed"
                name="tenantId"
                id="field_tenantId"
                formControlName="tenantId"
              />
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="p-3 mb-3 rounded border h-100">
            <h6 class="fw-bold mb-3 text-uppercase small text-muted">Indicateurs (KPI)</h6>

            <div class="mb-3">
              <label
                class="form-label fw-semibold"
                jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.metricType"
                for="field_metricType"
                >Type de Métrique</label
              >
              <select
                class="form-select shadow-sm border-primary-subtle"
                name="metricType"
                formControlName="metricType"
                id="field_metricType"
              >
                <option [ngValue]="null">{{ 'tuniSalesGatewayApp.MetricType.null' | translate }}</option>
                <option *ngFor="let metricType of metricTypeValues" [value]="metricType">
                  {{ 'tuniSalesGatewayApp.MetricType.' + metricType | translate }}
                </option>
              </select>
            </div>

            <div class="row">
              <div class="col-6 mb-3">
                <label
                  class="form-label fw-semibold text-primary"
                  jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.targetValue"
                  for="field_targetValue"
                  >Objectif</label
                >
                <input
                  type="number"
                  class="form-control form-control-lg border-primary shadow-sm text-center font-monospace"
                  name="targetValue"
                  id="field_targetValue"
                  formControlName="targetValue"
                />
              </div>
              <div class="col-6 mb-3">
                <label
                  class="form-label fw-semibold text-success"
                  jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.achievedValue"
                  for="field_achievedValue"
                  >Réalisé</label
                >
                <input
                  type="number"
                  class="form-control form-control-lg border-success shadow-sm text-center font-monospace"
                  name="achievedValue"
                  id="field_achievedValue"
                  formControlName="achievedValue"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row mt-2 px-2">
        <div class="col-md-6 mb-3">
          <label class="form-label small text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.createdAt">Créé le</label>
          <input
            type="datetime-local"
            class="form-control form-control-sm bg-light"
            name="createdAt"
            id="field_createdAt"
            formControlName="createdAt"
          />
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceObjective.updatedAt"
            >Mis à jour le</label
          >
          <input
            type="datetime-local"
            class="form-control form-control-sm bg-light"
            name="updatedAt"
            id="field_updatedAt"
            formControlName="updatedAt"
          />
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-4 mt-2">
        <button type="button" id="cancel-save" class="btn btn-outline-secondary px-4 shadow-sm" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5 shadow-sm">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
