<div class="container py-4">
  <div class="col-10 col-md-9 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4 d-flex justify-content-between align-items-center">
        <h2
          id="jhi-audit-log-heading"
          data-cy="AuditLogCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Journal d'Audit
        </h2>
        <span class="badge bg-secondary" *ngIf="editForm.get('action')?.value">
          {{ 'tuniSalesGatewayApp.AuditAction.' + editForm.get('action')?.value | translate }}
        </span>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light rounded">
          <h5 class="border-bottom pb-2 mb-3 text-primary">Cible de l'Action</h5>
          <div class="row">
            <div class="col-md-2 mb-3" *ngIf="editForm.controls.id.value !== null">
              <label class="form-label" jhiTranslate="global.field.id" for="field_id">Log ID</label>
              <input type="number" class="form-control bg-white" name="id" id="field_id" formControlName="id" [readonly]="true" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.entityType" for="field_entityType"
                >Type d'Entité</label
              >
              <input
                type="text"
                class="form-control"
                name="entityType"
                id="field_entityType"
                formControlName="entityType"
                placeholder="ex: Warehouse, StockItem..."
              />
              <div
                *ngIf="editForm.get('entityType')!.invalid && (editForm.get('entityType')!.dirty || editForm.get('entityType')!.touched)"
              >
                <small
                  class="form-text text-danger"
                  *ngIf="editForm.get('entityType')?.errors?.required"
                  jhiTranslate="entity.validation.required text-danger"
                  >Requis.</small
                >
              </div>
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.entityId" for="field_entityId"
                >ID de l'Entité</label
              >
              <input type="text" class="form-control" name="entityId" id="field_entityId" formControlName="entityId" />
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.action" for="field_action"
                >Action</label
              >
              <select class="form-control" name="action" formControlName="action" id="field_action">
                <option [ngValue]="null">{{ 'tuniSalesGatewayApp.AuditAction.null' | translate }}</option>
                <option *ngFor="let auditAction of auditActionValues" [value]="auditAction">
                  {{ 'tuniSalesGatewayApp.AuditAction.' + auditAction | translate }}
                </option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-secondary">Comparaison des Données</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label
              class="form-label text-muted"
              jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.beforeJson"
              for="field_beforeJson"
              >État Précédent (JSON)</label
            >
            <textarea
              class="form-control text-monospace bg-light"
              name="beforeJson"
              id="field_beforeJson"
              rows="5"
              formControlName="beforeJson"
              style="font-family: monospace; font-size: 0.85rem"
            ></textarea>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.afterJson" for="field_afterJson"
              >Nouvel État (JSON)</label
            >
            <textarea
              class="form-control text-monospace bg-light border-success-subtle"
              name="afterJson"
              id="field_afterJson"
              rows="5"
              formControlName="afterJson"
              style="font-family: monospace; font-size: 0.85rem"
            ></textarea>
          </div>
        </div>
      </div>

      <div class="card border-0 mb-4 shadow-sm">
        <div class="card-body">
          <h5 class="border-bottom pb-2 mb-3 text-secondary">Origine & Utilisateur</h5>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label
                class="form-label"
                jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.performedByLogin"
                for="field_performedByLogin"
                >Utilisateur</label
              >
              <div class="input-group">
                <span class="input-group-text"><fa-icon icon="user-shield"></fa-icon></span>
                <input
                  type="text"
                  class="form-control"
                  name="performedByLogin"
                  id="field_performedByLogin"
                  formControlName="performedByLogin"
                />
              </div>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.ipAddress" for="field_ipAddress"
                >Adresse IP</label
              >
              <input type="text" class="form-control" name="ipAddress" id="field_ipAddress" formControlName="ipAddress" />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label" jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.createdAt" for="field_createdAt"
                >Horodatage</label
              >
              <input type="datetime-local" class="form-control" name="createdAt" id="field_createdAt" formControlName="createdAt" />
            </div>

            <div class="col-12 mb-3">
              <label
                class="form-label text-muted"
                jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.userAgent"
                for="field_userAgent"
                >Navigateur / User Agent</label
              >
              <input
                type="text"
                class="form-control form-control-sm text-truncate"
                name="userAgent"
                id="field_userAgent"
                formControlName="userAgent"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-4">
        <div class="text-muted small">
          <span jhiTranslate="tuniSalesGatewayApp.platformServiceAuditLog.tenantId">Tenant :</span> {{ editForm.get('tenantId')?.value }}
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
            <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
          </button>

          <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5">
            <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Enregistrer</span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
