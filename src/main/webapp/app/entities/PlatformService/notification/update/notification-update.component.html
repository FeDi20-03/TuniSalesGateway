<div class="container py-4">
  <div class="col-10 col-md-9 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4 d-flex justify-content-between align-items-center">
        <h2
          id="jhi-notification-heading"
          data-cy="NotificationCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.home.createOrEditLabel"
          class="mb-0 text-dark"
        >
          Gestion de la Notification
        </h2>
        <div class="d-flex align-items-center gap-3">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" name="isRead" id="field_isRead" formControlName="isRead" />
            <label
              class="form-check-label small fw-bold"
              for="field_isRead"
              jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.isRead"
              >Lue</label
            >
          </div>
          <span class="badge bg-info text-dark" *ngIf="editForm.get('type')?.value">
            {{ 'tuniSalesGatewayApp.NotificationType.' + editForm.get('type')?.value | translate }}
          </span>
        </div>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="row">
        <div class="col-md-7">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
              <h5 class="border-bottom pb-2 mb-3 text-primary">Message</h5>

              <div class="mb-3">
                <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.title" for="field_title"
                  >Titre</label
                >
                <input
                  type="text"
                  class="form-control"
                  name="title"
                  id="field_title"
                  formControlName="title"
                  placeholder="Objet de la notification"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.body" for="field_body"
                  >Contenu (Body)</label
                >
                <textarea
                  class="form-control"
                  name="body"
                  id="field_body"
                  rows="4"
                  formControlName="body"
                  placeholder="Détails du message..."
                ></textarea>
              </div>

              <div class="mb-0">
                <label
                  class="form-label text-muted small"
                  jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.payloadJson"
                  for="field_payloadJson"
                  >Payload JSON (Données brutes)</label
                >
                <textarea
                  class="form-control bg-light text-monospace small"
                  name="payloadJson"
                  id="field_payloadJson"
                  rows="3"
                  formControlName="payloadJson"
                  style="font-family: monospace"
                ></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-5">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body bg-light rounded">
              <h5 class="border-bottom pb-2 mb-3 text-secondary">Destinataire & Type</h5>

              <div class="mb-3">
                <label
                  class="form-label"
                  jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.recipientLogin"
                  for="field_recipientLogin"
                  >Identifiant Destinataire</label
                >
                <div class="input-group">
                  <span class="input-group-text"><fa-icon icon="user"></fa-icon></span>
                  <input
                    type="text"
                    class="form-control"
                    name="recipientLogin"
                    id="field_recipientLogin"
                    formControlName="recipientLogin"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.type" for="field_type"
                  >Canal / Type</label
                >
                <select class="form-select" name="type" formControlName="type" id="field_type">
                  <option [ngValue]="null">{{ 'tuniSalesGatewayApp.NotificationType.null' | translate }}</option>
                  <option *ngFor="let notificationType of notificationTypeValues" [value]="notificationType">
                    {{ 'tuniSalesGatewayApp.NotificationType.' + notificationType | translate }}
                  </option>
                </select>
              </div>

              <div class="mb-0">
                <label class="form-label small" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.tenantId">Tenant ID</label>
                <input type="number" class="form-control form-control-sm" name="tenantId" formControlName="tenantId" />
              </div>
            </div>
          </div>

          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h5 class="border-bottom pb-2 mb-3 text-secondary">Historique</h5>

              <div class="mb-3">
                <label class="form-label small text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.createdAt"
                  >Créée le</label
                >
                <input type="datetime-local" class="form-control form-control-sm" name="createdAt" formControlName="createdAt" />
              </div>

              <div class="mb-0" *ngIf="editForm.get('isRead')?.value">
                <label class="form-label small text-muted" jhiTranslate="tuniSalesGatewayApp.platformServiceNotification.readAt"
                  >Lue le</label
                >
                <input
                  type="datetime-local"
                  class="form-control form-control-sm border-success-subtle"
                  name="readAt"
                  formControlName="readAt"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-4">
        <small class="text-muted" *ngIf="editForm.get('id')?.value">Notification ID: {{ editForm.get('id')?.value }}</small>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-secondary px-4" (click)="previousState()">
            <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
          </button>

          <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-5 shadow-sm">
            <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Envoyer / Enregistrer</span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
