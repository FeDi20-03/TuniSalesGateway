<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <!-- HEADER -->
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-delivery-heading"
          data-cy="DeliveryCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceDelivery.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Delivery
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <!-- SECTION 1 : INFOS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>

        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" id="field_id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_tenantId">Tenant Id</label>
            <input type="number" class="form-control" id="field_tenantId" formControlName="tenantId" />
          </div>
        </div>
      </div>

      <!-- SECTION 2 : LIVRAISON -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Livraison</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_deliveryNumber">Delivery Number</label>
            <input type="text" class="form-control" id="field_deliveryNumber" formControlName="deliveryNumber" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_status">Status</label>
            <select class="form-control" id="field_status" formControlName="status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.DeliveryStatus.null' | translate }}</option>
              <option *ngFor="let deliveryStatus of deliveryStatusValues" [value]="deliveryStatus">
                {{ 'tuniSalesGatewayApp.DeliveryStatus.' + deliveryStatus | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" for="field_trackingNumber">Tracking Number</label>
            <input type="text" class="form-control" id="field_trackingNumber" formControlName="trackingNumber" />
          </div>
        </div>
      </div>

      <!-- SECTION 3 : DATES -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_shippedAt">Shipped At</label>
            <input type="datetime-local" class="form-control" id="field_shippedAt" formControlName="shippedAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_deliveredAt">Delivered At</label>
            <input type="datetime-local" class="form-control" id="field_deliveredAt" formControlName="deliveredAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_confirmedAt">Confirmed At</label>
            <input type="datetime-local" class="form-control" id="field_confirmedAt" formControlName="confirmedAt" />
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" for="field_createdAt">Created At</label>
            <input type="datetime-local" class="form-control" id="field_createdAt" formControlName="createdAt" />
          </div>
        </div>
      </div>

      <!-- SECTION 4 : NOTES + RELATION -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Notes & Relation</h5>

        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label" for="field_notes">Notes</label>
            <input type="text" class="form-control" id="field_notes" formControlName="notes" />
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" for="field_order">Order</label>
            <select class="form-control" id="field_order" formControlName="order" [compareWith]="compareOrder">
              <option *ngIf="editForm.get(['order'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="orderOption" *ngFor="let orderOption of ordersSharedCollection">
                {{ orderOption.orderNumber }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>
          Annuler
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>
          Sauvegarder
        </button>
      </div>
    </form>
  </div>
</div>
