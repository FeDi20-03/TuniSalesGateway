<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-order-line-heading"
          data-cy="OrderLineCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Order Line
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Produit et Commande</h5>
        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.product" for="field_product"
              >Product</label
            >
            <select
              class="form-control"
              id="field_product"
              data-cy="product"
              name="product"
              formControlName="product"
              [compareWith]="compareProduct"
            >
              <option *ngIf="!editForm.get('product')!.value" [ngValue]="null" selected></option>
              <option [ngValue]="productOption" *ngFor="let productOption of productsSharedCollection">{{ productOption.name }}</option>
            </select>
            <div *ngIf="editForm.get(['product'])!.invalid && (editForm.get(['product'])!.dirty || editForm.get(['product'])!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get(['product'])?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Ce champ est obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.order" for="field_order"
              >Order Reference</label
            >
            <select class="form-control" id="field_order" data-cy="order" name="order" formControlName="order" [compareWith]="compareOrder">
              <option *ngIf="editForm.get(['order'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="orderOption" *ngFor="let orderOption of ordersSharedCollection">{{ orderOption.orderNumber }}</option>
            </select>
            <div *ngIf="editForm.get(['order'])!.invalid && (editForm.get(['order'])!.dirty || editForm.get(['order'])!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get(['order'])?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Ce champ est obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Détails de tarification</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.quantity" for="field_quantity"
              >Quantity</label
            >
            <input type="number" class="form-control" name="quantity" id="field_quantity" data-cy="quantity" formControlName="quantity" />
            <div *ngIf="editForm.get('quantity')!.invalid && (editForm.get('quantity')!.dirty || editForm.get('quantity')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('quantity')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('quantity')?.errors?.min"
                jhiTranslate="entity.validation.min"
                [translateValues]="{ min: 1 }"
                >Min 1.</small
              >
            </div>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.unitPrice" for="field_unitPrice"
              >Unit Price</label
            >
            <input
              type="number"
              class="form-control"
              name="unitPrice"
              id="field_unitPrice"
              data-cy="unitPrice"
              formControlName="unitPrice"
            />
            <div *ngIf="editForm.get('unitPrice')!.invalid && (editForm.get('unitPrice')!.dirty || editForm.get('unitPrice')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('unitPrice')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.discountPct" for="field_discountPct"
              >Discount %</label
            >
            <input
              type="number"
              class="form-control"
              name="discountPct"
              id="field_discountPct"
              data-cy="discountPct"
              formControlName="discountPct"
            />
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.lineTotal" for="field_lineTotal"
              >Line Total (Calculé)</label
            >
            <input
              type="number"
              class="form-control fw-bold"
              name="lineTotal"
              id="field_lineTotal"
              data-cy="lineTotal"
              formControlName="lineTotal"
            />
            <div *ngIf="editForm.get('lineTotal')!.invalid && (editForm.get('lineTotal')!.dirty || editForm.get('lineTotal')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('lineTotal')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Le total est requis.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Traçabilité</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLine.createdAt" for="field_createdAt"
              >Created At</label
            >
            <input
              type="datetime-local"
              class="form-control"
              name="createdAt"
              id="field_createdAt"
              data-cy="createdAt"
              formControlName="createdAt"
            />
            <div *ngIf="editForm.get('createdAt')!.invalid && (editForm.get('createdAt')!.dirty || editForm.get('createdAt')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('createdAt')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Ce champ est obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
