<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-order-heading"
          data-cy="OrderCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Order
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>
        <div class="row">
          <div class="col-md-4 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.tenantId" for="field_tenantId"
              >Tenant Id</label
            >
            <input type="number" class="form-control" name="tenantId" id="field_tenantId" data-cy="tenantId" formControlName="tenantId" />
            <div *ngIf="editForm.get('tenantId')!.invalid && (editForm.get('tenantId')!.dirty || editForm.get('tenantId')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('tenantId')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Ce champ est obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.orderNumber" for="field_orderNumber"
              >Order Number</label
            >
            <input
              type="text"
              class="form-control"
              name="orderNumber"
              id="field_orderNumber"
              data-cy="orderNumber"
              formControlName="orderNumber"
            />
            <div
              *ngIf="editForm.get('orderNumber')!.invalid && (editForm.get('orderNumber')!.dirty || editForm.get('orderNumber')!.touched)"
            >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('orderNumber')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Ce champ est obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Montants et Conditions</h5>
        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.subtotal" for="field_subtotal">Subtotal</label>
            <input type="number" class="form-control" name="subtotal" id="field_subtotal" data-cy="subtotal" formControlName="subtotal" />
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.discountAmount" for="field_discountAmount"
              >Discount</label
            >
            <input
              type="number"
              class="form-control"
              name="discountAmount"
              id="field_discountAmount"
              data-cy="discountAmount"
              formControlName="discountAmount"
            />
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.taxAmount" for="field_taxAmount"
              >Tax Amount</label
            >
            <input
              type="number"
              class="form-control"
              name="taxAmount"
              id="field_taxAmount"
              data-cy="taxAmount"
              formControlName="taxAmount"
            />
          </div>

          <div class="col-md-3 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.totalAmount" for="field_totalAmount"
              >Total Amount</label
            >
            <input
              type="number"
              class="form-control"
              name="totalAmount"
              id="field_totalAmount"
              data-cy="totalAmount"
              formControlName="totalAmount"
            />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.paymentTermsDays" for="field_paymentTermsDays"
              >Payment Terms (Days)</label
            >
            <input
              type="number"
              class="form-control"
              name="paymentTermsDays"
              id="field_paymentTermsDays"
              data-cy="paymentTermsDays"
              formControlName="paymentTermsDays"
            />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Statut & Rejet</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.status" for="field_status">Status</label>
            <select class="form-control" name="status" formControlName="status" id="field_status" data-cy="status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.OrderStatus.null' | translate }}</option>
              <option *ngFor="let orderStatus of orderStatusValues" [value]="orderStatus">
                {{ 'tuniSalesGatewayApp.OrderStatus.' + orderStatus | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3 d-flex align-items-center">
            <div class="form-check mt-4">
              <input
                type="checkbox"
                class="form-check-input"
                name="isDeleted"
                id="field_isDeleted"
                data-cy="isDeleted"
                formControlName="isDeleted"
              />
              <label class="form-check-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.isDeleted" for="field_isDeleted"
                >Is Deleted</label
              >
            </div>
          </div>

          <div class="col-12 mb-3" *ngIf="editForm.get('status')?.value === 'rejete' || editForm.get('rejectionReason')?.value">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.rejectionReason" for="field_rejectionReason"
              >Rejection Reason</label
            >
            <input
              type="text"
              class="form-control"
              name="rejectionReason"
              id="field_rejectionReason"
              data-cy="rejectionReason"
              formControlName="rejectionReason"
            />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates Clés</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.dueDate" for="field_dueDate">Due Date</label>
            <input type="datetime-local" class="form-control" name="dueDate" id="field_dueDate" formControlName="dueDate" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.submittedAt" for="field_submittedAt"
              >Submitted At</label
            >
            <input type="datetime-local" class="form-control" name="submittedAt" id="field_submittedAt" formControlName="submittedAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.validatedAt" for="field_validatedAt"
              >Validated At</label
            >
            <input type="datetime-local" class="form-control" name="validatedAt" id="field_validatedAt" formControlName="validatedAt" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.createdAt" for="field_createdAt"
              >Created At</label
            >
            <input type="datetime-local" class="form-control" name="createdAt" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.updatedAt" for="field_updatedAt"
              >Updated At</label
            >
            <input type="datetime-local" class="form-control" name="updatedAt" id="field_updatedAt" formControlName="updatedAt" />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Relations</h5>
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrder.client" for="field_client">Client</label>
            <select
              class="form-control"
              id="field_client"
              data-cy="client"
              name="client"
              formControlName="client"
              [compareWith]="compareClient"
            >
              <option *ngIf="editForm.get(['client'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="clientOption" *ngFor="let clientOption of clientsSharedCollection">{{ clientOption.name }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
