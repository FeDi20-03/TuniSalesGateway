<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <!-- HEADER -->
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-invoice-heading"
          data-cy="InvoiceCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceInvoice.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Invoice
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <!-- SECTION 1 : INFOS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>

        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" id="field_id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_tenantId">Tenant Id</label>
            <input type="number" class="form-control" id="field_tenantId" formControlName="tenantId" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_invoiceNumber">Invoice Number</label>
            <input type="text" class="form-control" id="field_invoiceNumber" formControlName="invoiceNumber" />
          </div>
        </div>
      </div>

      <!-- SECTION 2 : MONTANTS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Montants</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_amountHt">Amount HT</label>
            <input type="number" class="form-control" id="field_amountHt" formControlName="amountHt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_taxAmount">Tax Amount</label>
            <input type="number" class="form-control" id="field_taxAmount" formControlName="taxAmount" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_amountTtc">Amount TTC</label>
            <input type="number" class="form-control" id="field_amountTtc" formControlName="amountTtc" />
          </div>
        </div>
      </div>

      <!-- SECTION 3 : STATUS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Statut</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_status">Status</label>
            <select class="form-control" id="field_status" formControlName="status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.InvoiceStatus.null' | translate }}</option>
              <option *ngFor="let invoiceStatus of invoiceStatusValues" [value]="invoiceStatus">
                {{ 'tuniSalesGatewayApp.InvoiceStatus.' + invoiceStatus | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3 d-flex align-items-center">
            <input type="checkbox" class="form-check-input me-2" id="field_isDeleted" formControlName="isDeleted" />
            <label class="form-check-label" for="field_isDeleted">Is Deleted</label>
          </div>
        </div>
      </div>

      <!-- SECTION 4 : DATES -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_issueDate">Issue Date</label>
            <input type="datetime-local" class="form-control" id="field_issueDate" formControlName="issueDate" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_dueDate">Due Date</label>
            <input type="datetime-local" class="form-control" id="field_dueDate" formControlName="dueDate" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_paidAt">Paid At</label>
            <input type="datetime-local" class="form-control" id="field_paidAt" formControlName="paidAt" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_createdAt">Created At</label>
            <input type="datetime-local" class="form-control" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_updatedAt">Updated At</label>
            <input type="datetime-local" class="form-control" id="field_updatedAt" formControlName="updatedAt" />
          </div>
        </div>
      </div>

      <!-- SECTION 5 : RELATIONS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Relations</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_client">Client</label>
            <select class="form-control" id="field_client" formControlName="client" [compareWith]="compareClient">
              <option *ngIf="!editForm.get('client')!.value" [ngValue]="null" selected></option>
              <option [ngValue]="clientOption" *ngFor="let clientOption of clientsSharedCollection">
                {{ clientOption.name }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_order">Order</label>
            <select class="form-control" id="field_order" formControlName="order" [compareWith]="compareOrder">
              <option *ngIf="editForm.get(['order'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="orderOption" *ngFor="let orderOption of ordersSharedCollection">
                {{ orderOption.orderNumber }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>
          Annuler
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>
          Sauvegarder
        </button>
      </div>
    </form>
  </div>
</div>
