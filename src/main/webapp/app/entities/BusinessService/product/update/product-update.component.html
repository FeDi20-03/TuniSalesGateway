<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-product-heading"
          data-cy="ProductCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Produit
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Identification</h5>
        <div class="row">
          <div class="col-md-4 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.tenantId" for="field_tenantId"
              >Tenant Id</label
            >
            <input type="number" class="form-control" name="tenantId" id="field_tenantId" data-cy="tenantId" formControlName="tenantId" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.sku" for="field_sku">SKU / Référence</label>
            <input type="text" class="form-control" name="sku" id="field_sku" data-cy="sku" formControlName="sku" />
            <div *ngIf="editForm.get('sku')!.invalid && (editForm.get('sku')!.dirty || editForm.get('sku')!.touched)">
              <small class="form-text text-danger" *ngIf="editForm.get('sku')?.errors?.required" jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Détails du Produit</h5>
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.name" for="field_name">Nom commercial</label>
            <input type="text" class="form-control" name="name" id="field_name" data-cy="name" formControlName="name" />
            <div *ngIf="editForm.get('name')!.invalid && (editForm.get('name')!.dirty || editForm.get('name')!.touched)">
              <small class="form-text text-danger" *ngIf="editForm.get('name')?.errors?.required" jhiTranslate="entity.validation.required"
                >Le nom est obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.brand" for="field_brand">Marque</label>
            <input type="text" class="form-control" name="brand" id="field_brand" data-cy="brand" formControlName="brand" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.category" for="field_category"
              >Catégorie</label
            >
            <input type="text" class="form-control" name="category" id="field_category" data-cy="category" formControlName="category" />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Tarification</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.price" for="field_price">Prix de base</label>
            <div class="input-group">
              <input type="number" class="form-control" name="price" id="field_price" data-cy="price" formControlName="price" />
              <span class="input-group-text">DT</span>
            </div>
            <div *ngIf="editForm.get('price')!.invalid && (editForm.get('price')!.dirty || editForm.get('price')!.touched)">
              <small class="form-text text-danger" *ngIf="editForm.get('price')?.errors?.required" jhiTranslate="entity.validation.required"
                >Le prix est requis.</small
              >
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.taxRate" for="field_taxRate"
              >Taux de TVA (%)</label
            >
            <input type="number" class="form-control" name="taxRate" id="field_taxRate" data-cy="taxRate" formControlName="taxRate" />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Statut & Système</h5>
        <div class="row align-items-center">
          <div class="col-md-4 mb-3">
            <div class="form-check form-switch">
              <input
                type="checkbox"
                class="form-check-input"
                name="isActive"
                id="field_isActive"
                data-cy="isActive"
                formControlName="isActive"
              />
              <label class="form-check-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.isActive" for="field_isActive"
                >Produit Actif</label
              >
            </div>
          </div>

          <div class="col-md-4 mb-3">
            <div class="form-check form-switch">
              <input
                type="checkbox"
                class="form-check-input border-danger"
                name="isDeleted"
                id="field_isDeleted"
                data-cy="isDeleted"
                formControlName="isDeleted"
              />
              <label
                class="form-check-label text-danger"
                jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.isDeleted"
                for="field_isDeleted"
                >Marquer comme supprimé</label
              >
            </div>
          </div>
        </div>

        <div class="row mt-2">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.createdAt" for="field_createdAt"
              >Créé le</label
            >
            <input
              type="datetime-local"
              class="form-control form-control-sm"
              name="createdAt"
              id="field_createdAt"
              formControlName="createdAt"
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceProduct.updatedAt" for="field_updatedAt"
              >Dernière modification</label
            >
            <input
              type="datetime-local"
              class="form-control form-control-sm"
              name="updatedAt"
              id="field_updatedAt"
              formControlName="updatedAt"
            />
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button
          type="button"
          id="cancel-save"
          data-cy="entityCreateCancelButton"
          class="btn btn-outline-secondary"
          (click)="previousState()"
        >
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder le produit</span>
        </button>
      </div>
    </form>
  </div>
</div>
