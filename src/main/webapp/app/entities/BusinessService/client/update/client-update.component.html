<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <!-- HEADER -->
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-client-heading"
          data-cy="ClientCreateUpdateHeading"
          class="mb-0"
          jhiTranslate="tuniSalesGatewayApp.businessServiceClient.home.createOrEditLabel"
        >
          Créer ou éditer un Client
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>
      <jhi-alert></jhi-alert>

      <!-- SECTION 1 : INFOS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>

        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" for="field_codeClient">Code Client</label>
            <input type="text" class="form-control" id="field_codeClient" formControlName="codeClient" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_tenantId">Tenant Id</label>
            <input type="number" class="form-control" id="field_tenantId" formControlName="tenantId" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_name">Name</label>
            <input type="text" class="form-control" id="field_name" formControlName="name" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_taxId">Tax Id</label>
            <input type="text" class="form-control" id="field_taxId" formControlName="taxId" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_clientType">Client Type</label>
            <select class="form-control" id="field_clientType" formControlName="clientType">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.ClientType.null' | translate }}</option>
              <option *ngFor="let clientType of clientTypeValues" [value]="clientType">
                {{ 'tuniSalesGatewayApp.ClientType.' + clientType | translate }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- SECTION 2 : FINANCE -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations financières</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_creditLimit">Credit Limit</label>
            <input type="number" class="form-control" id="field_creditLimit" formControlName="creditLimit" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_creditUsed">Credit Used</label>
            <input type="number" class="form-control" id="field_creditUsed" formControlName="creditUsed" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_paymentTermsDays">Payment Terms Days</label>
            <input type="number" class="form-control" id="field_paymentTermsDays" formControlName="paymentTermsDays" />
          </div>
        </div>
      </div>

      <!-- SECTION 3 : STATUS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Statut</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_status">Status</label>
            <select class="form-control" id="field_status" formControlName="status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.ClientStatus.null' | translate }}</option>
              <option *ngFor="let clientStatus of clientStatusValues" [value]="clientStatus">
                {{ 'tuniSalesGatewayApp.ClientStatus.' + clientStatus | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3 d-flex align-items-center">
            <input type="checkbox" class="form-check-input me-2" id="field_isDeleted" formControlName="isDeleted" />
            <label class="form-check-label" for="field_isDeleted">Is Deleted</label>
          </div>
        </div>
      </div>

      <!-- SECTION 4 : DATES -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_lastOrderAt">Last Order At</label>
            <input type="datetime-local" class="form-control" id="field_lastOrderAt" formControlName="lastOrderAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_createdAt">Created At</label>
            <input type="datetime-local" class="form-control" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_updatedAt">Updated At</label>
            <input type="datetime-local" class="form-control" id="field_updatedAt" formControlName="updatedAt" />
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>
          Annuler
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary">
          <fa-icon icon="save"></fa-icon>
          Sauvegarder
        </button>
      </div>
    </form>
  </div>
</div>
