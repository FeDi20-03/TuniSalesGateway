<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-order-line-item-heading"
          data-cy="OrderLineItemCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLineItem.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Order Line Item
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Identification du Stock</h5>
        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLineItem.stockItemId" for="field_stockItemId"
              >Stock Item Id</label
            >
            <input
              type="number"
              class="form-control"
              name="stockItemId"
              id="field_stockItemId"
              data-cy="stockItemId"
              formControlName="stockItemId"
            />
            <div
              *ngIf="editForm.get('stockItemId')!.invalid && (editForm.get('stockItemId')!.dirty || editForm.get('stockItemId')!.touched)"
            >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('stockItemId')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-12 mb-3">
            <label
              class="form-label"
              jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLineItem.stockItemImei"
              for="field_stockItemImei"
              >Stock Item IMEI</label
            >
            <input
              type="text"
              class="form-control"
              name="stockItemImei"
              id="field_stockItemImei"
              data-cy="stockItemImei"
              formControlName="stockItemImei"
              placeholder="Ex: 35XXXXXXXXXXXXX"
            />
            <div
              *ngIf="
                editForm.get('stockItemImei')!.invalid && (editForm.get('stockItemImei')!.dirty || editForm.get('stockItemImei')!.touched)
              "
            >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('stockItemImei')?.errors?.maxlength"
                jhiTranslate="entity.validation.maxlength"
                [translateValues]="{ max: 15 }"
                >Max 15 caractères.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Affectation</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLineItem.orderLine" for="field_orderLine"
              >Order Line Reference</label
            >
            <select
              class="form-control"
              id="field_orderLine"
              data-cy="orderLine"
              name="orderLine"
              formControlName="orderLine"
              [compareWith]="compareOrderLine"
            >
              <option *ngIf="editForm.get(['orderLine'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="orderLineOption" *ngFor="let orderLineOption of orderLinesSharedCollection">
                Ligne ID: {{ orderLineOption.id }}
              </option>
            </select>
            <div
              *ngIf="editForm.get(['orderLine'])!.invalid && (editForm.get(['orderLine'])!.dirty || editForm.get(['orderLine'])!.touched)"
            >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get(['orderLine'])?.errors?.required"
                jhiTranslate="entity.validation.required"
                >L'affectation est obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceOrderLineItem.assignedAt" for="field_assignedAt"
              >Assigned At</label
            >
            <input
              type="datetime-local"
              class="form-control"
              name="assignedAt"
              id="field_assignedAt"
              data-cy="assignedAt"
              formControlName="assignedAt"
            />
            <div *ngIf="editForm.get('assignedAt')!.invalid && (editForm.get('assignedAt')!.dirty || editForm.get('assignedAt')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('assignedAt')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >La date est obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
