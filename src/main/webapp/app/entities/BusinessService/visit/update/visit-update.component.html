<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-visit-heading"
          data-cy="VisitCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer une Visite
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Affectation</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.mission" for="field_mission">Mission</label>
            <select class="form-control" id="field_mission" name="mission" formControlName="mission" [compareWith]="compareMission">
              <option *ngIf="editForm.get(['mission'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="missionOption" *ngFor="let missionOption of missionsSharedCollection">{{ missionOption.title }}</option>
            </select>
            <div *ngIf="editForm.get(['mission'])!.invalid && (editForm.get(['mission'])!.dirty || editForm.get(['mission'])!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get(['mission'])?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.client" for="field_client">Client</label>
            <select class="form-control" id="field_client" name="client" formControlName="client" [compareWith]="compareClient">
              <option *ngIf="!editForm.get('client')!.value" [ngValue]="null" selected></option>
              <option [ngValue]="clientOption" *ngFor="let clientOption of clientsSharedCollection">{{ clientOption.name }}</option>
            </select>
            <div *ngIf="editForm.get(['client'])!.invalid && (editForm.get(['client'])!.dirty || editForm.get(['client'])!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get(['client'])?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Déroulement</h5>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.visitOrder" for="field_visitOrder"
              >Ordre de visite</label
            >
            <input type="number" class="form-control" name="visitOrder" id="field_visitOrder" formControlName="visitOrder" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.objective" for="field_objective"
              >Objectif</label
            >
            <select class="form-control" name="objective" formControlName="objective" id="field_objective">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.VisitObjective.null' | translate }}</option>
              <option *ngFor="let visitObjective of visitObjectiveValues" [value]="visitObjective">
                {{ 'tuniSalesGatewayApp.VisitObjective.' + visitObjective | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.status" for="field_status"
              >Statut actuel</label
            >
            <select class="form-control" name="status" formControlName="status" id="field_status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.VisitStatus.null' | translate }}</option>
              <option *ngFor="let visitStatus of visitStatusValues" [value]="visitStatus">
                {{ 'tuniSalesGatewayApp.VisitStatus.' + visitStatus | translate }}
              </option>
            </select>
          </div>
        </div>

        <div class="row mt-2">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.checkinAt" for="field_checkinAt"
              >Check-in</label
            >
            <input type="datetime-local" class="form-control" name="checkinAt" id="field_checkinAt" formControlName="checkinAt" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.checkoutAt" for="field_checkoutAt"
              >Check-out</label
            >
            <input type="datetime-local" class="form-control" name="checkoutAt" id="field_checkoutAt" formControlName="checkoutAt" />
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3 text-primary">Données de Terrain</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Coordonnées GPS</label>
            <div class="input-group">
              <span class="input-group-text">Lat</span>
              <input type="number" class="form-control" name="latitude" formControlName="latitude" placeholder="0.0000" />
              <span class="input-group-text">Long</span>
              <input type="number" class="form-control" name="longitude" formControlName="longitude" placeholder="0.0000" />
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.createdAt" for="field_createdAt"
              >Créé le</label
            >
            <input type="datetime-local" class="form-control" name="createdAt" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-12 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServiceVisit.notes" for="field_notes"
              >Notes / Observations</label
            >
            <textarea
              class="form-control"
              name="notes"
              id="field_notes"
              rows="3"
              formControlName="notes"
              placeholder="Détails de la visite..."
            ></textarea>
            <div *ngIf="editForm.get('notes')!.invalid && (editForm.get('notes')!.dirty || editForm.get('notes')!.touched)">
              <small class="form-text text-danger" *ngIf="editForm.get('notes')?.errors?.maxlength">Maximum 2000 caractères.</small>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" class="btn btn-outline-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary px-4">
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder la visite</span>
        </button>
      </div>
    </form>
  </div>
</div>
