<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <!-- HEADER -->
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-client-contact-heading"
          data-cy="ClientContactCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceClientContact.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Client Contact
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <!-- SECTION 1 : INFOS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>

        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" id="field_id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_fullName">Full Name</label>
            <input type="text" class="form-control" id="field_fullName" formControlName="fullName" />
          </div>
        </div>
      </div>

      <!-- SECTION 2 : CONTACT -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Contact</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_email">Email</label>
            <input type="text" class="form-control" id="field_email" formControlName="email" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_phone">Phone</label>
            <input type="text" class="form-control" id="field_phone" formControlName="phone" />
          </div>
        </div>
      </div>

      <!-- SECTION 3 : PARAMETRES -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Paramètres</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_role">Role</label>
            <select class="form-control" id="field_role" formControlName="role">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.ContactRole.null' | translate }}</option>
              <option *ngFor="let contactRole of contactRoleValues" [value]="contactRole">
                {{ 'tuniSalesGatewayApp.ContactRole.' + contactRole | translate }}
              </option>
            </select>
          </div>

          <div class="col-md-6 mb-3 d-flex align-items-center">
            <input type="checkbox" class="form-check-input me-2" id="field_isPrimary" formControlName="isPrimary" />
            <label class="form-check-label" for="field_isPrimary">Is Primary</label>
          </div>
        </div>
      </div>

      <!-- SECTION 4 : DATES + RELATION -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates & Relation</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_createdAt">Created At</label>
            <input type="datetime-local" class="form-control" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_client">Client</label>
            <select class="form-control" id="field_client" formControlName="client" [compareWith]="compareClient">
              <option *ngIf="editForm.get(['client'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="clientOption" *ngFor="let clientOption of clientsSharedCollection">
                {{ clientOption.name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>
          Annuler
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>
          Sauvegarder
        </button>
      </div>
    </form>
  </div>
</div>
