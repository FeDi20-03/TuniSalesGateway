<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <!-- HEADER -->
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-mission-heading"
          data-cy="MissionCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServiceMission.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Mission
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <!-- SECTION 1 : INFOS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Informations générales</h5>

        <div class="row">
          <div class="col-md-6 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" for="field_id">ID</label>
            <input type="number" class="form-control" id="field_id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_tenantId">Tenant Id</label>
            <input type="number" class="form-control" id="field_tenantId" formControlName="tenantId" />
          </div>
        </div>
      </div>

      <!-- SECTION 2 : DETAILS MISSION -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Détails de mission</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_assignedToLogin">Assigned To</label>
            <input type="text" class="form-control" id="field_assignedToLogin" formControlName="assignedToLogin" />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_title">Title</label>
            <input type="text" class="form-control" id="field_title" formControlName="title" />
          </div>

          <div class="col-md-12 mb-3">
            <label class="form-label" for="field_description">Description</label>
            <input type="text" class="form-control" id="field_description" formControlName="description" />
          </div>
        </div>
      </div>

      <!-- SECTION 3 : STATUS -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Statut</h5>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="field_status">Status</label>
            <select class="form-control" id="field_status" formControlName="status">
              <option [ngValue]="null">{{ 'tuniSalesGatewayApp.MissionStatus.null' | translate }}</option>
              <option *ngFor="let missionStatus of missionStatusValues" [value]="missionStatus">
                {{ 'tuniSalesGatewayApp.MissionStatus.' + missionStatus | translate }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- SECTION 4 : DATES -->
      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Dates</h5>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_missionDate">Mission Date</label>
            <input type="datetime-local" class="form-control" id="field_missionDate" formControlName="missionDate" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_createdAt">Created At</label>
            <input type="datetime-local" class="form-control" id="field_createdAt" formControlName="createdAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="field_updatedAt">Updated At</label>
            <input type="datetime-local" class="form-control" id="field_updatedAt" formControlName="updatedAt" />
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>
          Annuler
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>
          Sauvegarder
        </button>
      </div>
    </form>
  </div>
</div>
