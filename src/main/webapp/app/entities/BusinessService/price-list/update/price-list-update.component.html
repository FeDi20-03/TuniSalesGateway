<div class="container py-4">
  <div class="col-10 col-md-8 mx-auto">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <div class="border-bottom pb-3 mb-4">
        <h2
          id="jhi-price-list-heading"
          data-cy="PriceListCreateUpdateHeading"
          jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.home.createOrEditLabel"
          class="mb-0"
        >
          Créer ou éditer un Price List
        </h2>
      </div>

      <jhi-alert-error></jhi-alert-error>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Configuration Tarifaire</h5>
        <div class="row">
          <div class="col-md-4 mb-3" *ngIf="editForm.controls.id.value !== null">
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.unitPrice" for="field_unitPrice"
              >Unit Price</label
            >
            <input
              type="number"
              class="form-control"
              name="unitPrice"
              id="field_unitPrice"
              data-cy="unitPrice"
              formControlName="unitPrice"
            />
            <div *ngIf="editForm.get('unitPrice')!.invalid && (editForm.get('unitPrice')!.dirty || editForm.get('unitPrice')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('unitPrice')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('unitPrice')?.errors?.min"
                jhiTranslate="entity.validation.min"
                [translateValues]="{ min: 0 }"
                >Min 0.</small
              >
            </div>
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.maxDiscountPct" for="field_maxDiscountPct"
              >Max Discount %</label
            >
            <input
              type="number"
              class="form-control"
              name="maxDiscountPct"
              id="field_maxDiscountPct"
              data-cy="maxDiscountPct"
              formControlName="maxDiscountPct"
            />
            <div
              *ngIf="
                editForm.get('maxDiscountPct')!.invalid &&
                (editForm.get('maxDiscountPct')!.dirty || editForm.get('maxDiscountPct')!.touched)
              "
            >
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('maxDiscountPct')?.errors?.max"
                jhiTranslate="entity.validation.max"
                [translateValues]="{ max: 100 }"
                >Max 100%.</small
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Validité et État</h5>
        <div class="row">
          <div class="col-md-5 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.validFrom" for="field_validFrom"
              >Valid From</label
            >
            <input type="datetime-local" class="form-control" name="validFrom" id="field_validFrom" formControlName="validFrom" />
            <div *ngIf="editForm.get('validFrom')!.invalid && (editForm.get('validFrom')!.dirty || editForm.get('validFrom')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('validFrom')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-5 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.validTo" for="field_validTo"
              >Valid To</label
            >
            <input type="datetime-local" class="form-control" name="validTo" id="field_validTo" formControlName="validTo" />
            <div *ngIf="editForm.get('validTo')!.invalid && (editForm.get('validTo')!.dirty || editForm.get('validTo')!.touched)">
              <small
                class="form-text text-danger"
                *ngIf="editForm.get('validTo')?.errors?.required"
                jhiTranslate="entity.validation.required"
                >Obligatoire.</small
              >
            </div>
          </div>

          <div class="col-md-2 mb-3 d-flex align-items-center">
            <div class="form-check mt-4">
              <input
                type="checkbox"
                class="form-check-input"
                name="isActive"
                id="field_isActive"
                data-cy="isActive"
                formControlName="isActive"
              />
              <label class="form-check-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.isActive" for="field_isActive"
                >Active</label
              >
            </div>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Assignation</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.product" for="field_product"
              >Product</label
            >
            <select class="form-control" id="field_product" name="product" formControlName="product" [compareWith]="compareProduct">
              <option *ngIf="!editForm.get('product')!.value" [ngValue]="null" selected></option>
              <option [ngValue]="productOption" *ngFor="let productOption of productsSharedCollection">{{ productOption.name }}</option>
            </select>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.client" for="field_client"
              >Client Specific</label
            >
            <select class="form-control" id="field_client" name="client" formControlName="client" [compareWith]="compareClient">
              <option *ngIf="editForm.get(['client'])!.value == null" [ngValue]="null" selected></option>
              <option [ngValue]="clientOption" *ngFor="let clientOption of clientsSharedCollection">{{ clientOption.name }}</option>
            </select>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h5 class="border-bottom pb-2 mb-3">Système</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" jhiTranslate="tuniSalesGatewayApp.businessServicePriceList.createdAt" for="field_createdAt"
              >Created At</label
            >
            <input type="datetime-local" class="form-control" name="createdAt" id="field_createdAt" formControlName="createdAt" />
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3 mt-4">
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
