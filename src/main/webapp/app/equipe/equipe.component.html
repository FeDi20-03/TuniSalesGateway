<div class="container-fluid mt-4">
  <div class="row mb-4 align-items-center">
    <div class="col">
      <h2 class="fw-bold text-primary mb-0">Classement de l'Équipe</h2>
      <p class="text-muted">Performances et objectifs de vos commerciaux</p>
    </div>
    <div class="col-auto">
      <button class="btn btn-outline-secondary rounded-pill" routerLink="/">
        <fa-icon icon="arrow-left" class="me-2"></fa-icon>Retour au Dashboard
      </button>
    </div>
  </div>

  <div class="card border-0 shadow-sm rounded-lg">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="text-muted bg-light">
            <tr>
              <th class="border-0 py-3 ps-4 rounded-start">Position</th>
              <th class="border-0 py-3">Commercial</th>
              <th class="border-0 py-3">Ventes réalisées</th>
              <th class="border-0 py-3">Taux de réalisation</th>
              <th class="border-0 py-3 rounded-end">Statut</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let rep of commerciaux; let i = index" class="border-bottom">
              <td class="ps-4">
                <span
                  class="badge"
                  [ngClass]="i === 0 ? 'bg-warning' : i === 1 ? 'bg-secondary' : i === 2 ? 'bg-danger' : 'bg-light text-dark'"
                  style="
                    font-size: 1rem;
                    width: 30px;
                    height: 30px;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    border-radius: 50%;
                  "
                >
                  {{ i + 1 }}
                </span>
              </td>
              <td>
                <div class="d-flex align-items-center">
                  <div
                    class="bg-primary bg-opacity-10 rounded-circle d-flex justify-content-center align-items-center me-3 text-primary fw-bold"
                    style="width: 45px; height: 45px"
                  >
                    {{ rep.nom.charAt(0) }}
                  </div>
                  <div>
                    <span class="fw-bold text-dark d-block">{{ rep.nom }}</span>
                    <small class="text-muted">Commercial</small>
                  </div>
                </div>
              </td>
              <td class="fw-semibold text-dark fs-5">{{ rep.ventes | currency: 'TND':'symbol' }}</td>
              <td>
                <div class="d-flex align-items-center">
                  <div class="progress flex-grow-1 me-3" style="height: 8px">
                    <div
                      class="progress-bar"
                      [ngClass]="rep.objectif >= 100 ? 'bg-success' : rep.objectif >= 75 ? 'bg-primary' : 'bg-warning'"
                      role="progressbar"
                      [style.width.%]="rep.objectif > 100 ? 100 : rep.objectif"
                      [attr.aria-valuenow]="rep.objectif"
                      aria-valuemin="0"
                      aria-valuemax="100"
                    ></div>
                  </div>
                  <span class="fw-bold" [ngClass]="rep.objectif >= 100 ? 'text-success' : 'text-dark'">{{ rep.objectif }}%</span>
                </div>
              </td>
              <td>
                <span
                  class="badge rounded-pill px-3 py-2"
                  [ngClass]="
                    rep.objectif >= 100
                      ? 'bg-success bg-opacity-10 text-success'
                      : rep.objectif >= 75
                      ? 'bg-primary bg-opacity-10 text-primary'
                      : rep.objectif >= 50
                      ? 'bg-warning bg-opacity-10 text-warning'
                      : 'bg-danger bg-opacity-10 text-danger'
                  "
                >
                  {{ rep.statut }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
