<div class="login-container">
  <div class="login-card shadow rounded">
    <div class="logo-container">
      <h2 data-cy="loginTitle">LOGIN</h2>
      <p class="text-muted" jhiTranslate="login.title">Autentification</p>
    </div>

    <div class="alert alert-danger" *ngIf="authenticationError" jhiTranslate="login.messages.error.authentication" data-cy="loginError">
      <strong>Erreur d'authentification !</strong> Veuillez vérifier vos identifiants de connexion.
    </div>

    <form class="form" role="form" (ngSubmit)="login()" [formGroup]="loginForm">
      <div class="mb-3">
        <label class="form-label text-muted" for="username" jhiTranslate="global.form.username.label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-envelope" aria-hidden="true"></i></span>
          <input
            type="email"
            class="form-control"
            name="username"
            id="username"
            placeholder="example@domain.com"
            formControlName="username"
            #username
            data-cy="username"
            [ngClass]="{ 'is-invalid': loginForm.get('username')!.invalid && loginForm.get('username')!.touched }"
          />
        </div>
        <div *ngIf="loginForm.get('username')!.invalid && loginForm.get('username')!.touched" class="text-danger mt-1 small">
          <div *ngIf="loginForm.get('username')!.errors?.['required']">Email is required.</div>
          <div *ngIf="loginForm.get('username')!.errors?.['email']">Indicate a valid email.</div>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-muted" for="password" jhiTranslate="login.form.password">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa fa-lock" aria-hidden="true"></i></span>
          <input
            type="password"
            class="form-control"
            name="password"
            id="password"
            placeholder="{{ 'login.form.password.placeholder' | translate }}"
            formControlName="password"
            data-cy="password"
            [ngClass]="{ 'is-invalid': loginForm.get('password')!.invalid && loginForm.get('password')!.touched }"
          />
        </div>
        <div *ngIf="loginForm.get('password')!.invalid && loginForm.get('password')!.touched" class="text-danger mt-1 small">
          <div *ngIf="loginForm.get('password')!.errors?.['required']">Password is required.</div>
          <div *ngIf="loginForm.get('password')!.errors?.['minlength']">Password must be at least 4 characters long.</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
          <label class="form-check-label text-muted" for="rememberMe" jhiTranslate="login.form.rememberme">
            Garder la session ouverte
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3" data-cy="submit" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        <span jhiTranslate="login.form.button">Connexion</span>
      </button>

      <div class="text-center mt-3">
        <a
          class="text-decoration-none"
          routerLink="/account/reset/request"
          data-cy="forgetYourPasswordSelector"
          jhiTranslate="login.password.forgot"
        >
          Avez-vous oublié votre mot de passe ?
        </a>
      </div>
    </form>
  </div>
</div>
